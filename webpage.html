<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Webpage layout</title>
</head>
<style>
    header {
        background: blue;
        color: white;
        text-align: center;
        padding: 10px;
    }

    nav {
        background: gray;
        padding: 10px;
        text-align: center;
    }

    section {
        padding: 20px;
    }

    footer {
        background: black;
        color: white;
        text-align: center;
        padding: 10px;
    }
</style>
</head>

<body>
    <header>
        <h1>My Website</h1>
    </header>

    <nav>
        Home | About | Contact
    </nav>

    <section>
        <center>
            <h2>Welcome</h2>
            <p>This is simple webpage layout.</p>
        </center>
    </section>

    <footer>
        © 2026 My Website
    </footer>

    <body>
    </body>

</html>
