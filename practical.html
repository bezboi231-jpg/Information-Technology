<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Pratical Unit1</title>
</head>

<body style="background-color:lightblue;">
    <center>
        <h1>Background Color Changed</h1>
    </center>
    <div>
        <b>Bold</b><br>
        <i>Italic</i><br>
        <u>Underlined</u><br>
        <strong>Strong</strong><br>
        <em>Emphasized</em><br>
        <mark>Highlighted</mark><br>
        <small>Small</small><br>
        <del>Deleted</del><br>
        <ins>Inserted</ins><br>
    </div>
    <div>
        <h3>Unordered List</h3>
        <ul>
            <li>Apple</li>
            <li>Banana</li>
            <li>Mango</li>
        </ul>
    </div>
    <div>
        <h3>Ordered List</h3>
        <ol>
            <li>HTML</li>
            <li>CSS</li>
            <li>JavaScript</li>
        </ol>
    </div>
    <div>
        <table border="1">
            <tr>
                <th>Name</th>
                <th>Age</th>
            </tr>
            <tr>
                <td>John</td>
                <td>20</td>
            </tr>
            <tr>
                <td>Mary</td>
                <td>22</td>
            </tr>
        </table>
    </div><br>
    <div>
        <form>
            Name: <input type="text"><br><br>
            Email: <input type="email"><br><br>
            Password: <input type="password"><br><br>
            <input type="submit" value="Submit">
        </form>
    </div>
    <div>
        <a href="https://www.google.com">Visit Google</a>
    </div><br>
    <div>
        <img src="Picture.jpeg" width="200" alt="Sample Image">
    </div><br>
    <div>
        H<sub>2</sub>O <br>
        a<sup>2</sup> + b<sup>2</sup>
    </div>
</body>

</html>
